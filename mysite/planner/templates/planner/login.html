{% extends 'planner/base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>
        <p class="helper-link">
            Need an account? <a href="{% url 'signup' %}">Create one here</a>.
        </p>
    </div>
</div>
{% endblock %}
