{% extends 'planner/base.html' %}

{% block content %}
<div class="content-shell">
    <style>
        .object-page-date-nav {
            margin: 0 0 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .object-page-date {
            margin: 0;
            color: var(--primary);
            font-size: clamp(1.8rem, 5vw, 2.7rem);
            line-height: 1.2;
            text-align: center;
            flex: 1;
        }

        .date-arrow-link {
            width: 2.35rem;
            height: 2.35rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface);
            color: var(--primary);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .date-arrow-link:hover {
            background: var(--primary-soft);
        }

        .object-page-layout {
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(280px, 1fr);
            gap: 1.25rem;
            align-items: start;
        }

        .object-sidebar .card {
            padding: 1rem;
        }

        .object-sidebar h3 {
            margin: 0 0 0.85rem;
            color: var(--primary);
            font-size: 1.02rem;
        }

        .sidebar-form-row {
            margin-bottom: 0.75rem;
        }

        .sidebar-actions {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-top: 0.2rem;
        }

        .sidebar-actions button {
            padding: 0.52rem 0.8rem;
            font-size: 0.9rem;
        }

        .clear-filters-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .clear-filters-link:hover {
            text-decoration: underline;
        }

        .history-list {
            margin: 0.85rem 0 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 0.65rem;
        }

        .history-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 0.7rem;
            background: #fff;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 1000px) {
            .object-page-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <div class="object-page-date-nav" aria-label="Date navigation">
        <a class="date-arrow-link" href="{% url 'task-create' %}?date={{ selected_date_prev }}"
            aria-label="Previous day">&lsaquo;</a>
        <h2 class="object-page-date">{{ selected_date_display }}</h2>
        <a class="date-arrow-link" href="{% url 'task-create' %}?date={{ selected_date_next }}"
            aria-label="Next day">&rsaquo;</a>
    </div>

    <div class="object-page-layout">
        <section class="card" aria-label="Task editor">
            <h2>Add New Task</h2>
            <p class="form-note">Task form placeholder for now.</p>
            <p class="form-note">Selected date: {{ selected_date }}</p>
        </section>

        <aside class="object-sidebar" aria-label="Previous tasks and filters">
            <div class="card">
                <h3>Previous Tasks</h3>
                <form method="get">
                    <div class="sidebar-form-row">
                        <label for="task-keyword">Keyword Search</label>
                        <input id="task-keyword" name="keyword" type="text" placeholder="Search tasks"
                            value="{{ request.GET.keyword|default:'' }}">
                    </div>
                    <div class="sidebar-form-row">
                        <label for="task-start-date">Start Date</label>
                        <input id="task-start-date" name="start_date" type="date"
                            value="{{ request.GET.start_date|default:'' }}">
                    </div>
                    <div class="sidebar-form-row">
                        <label for="task-end-date">End Date</label>
                        <input id="task-end-date" name="end_date" type="date"
                            value="{{ request.GET.end_date|default:'' }}">
                    </div>
                    <div class="sidebar-form-row">
                        <label for="task-sort">Sort By</label>
                        <select id="task-sort" name="sort">
                            <option value="newest" {{ sort_newest_selected }}>Newest (date)</option>
                            <option value="oldest" {{ sort_oldest_selected }}>Oldest (date)
                            </option>
                            <option value="recent_edits" {{ sort_recent_edits_selected }}>
                                Recent edits</option>
                        </select>
                    </div>
                    <div class="sidebar-actions">
                        <button type="submit">Apply</button>
                        <a class="clear-filters-link" href="{% url 'task-create' %}">Clear filters</a>
                    </div>
                </form>

                <ul class="history-list" aria-label="Filtered task list">
                    <li class="history-item">No tasks yet.</li>
                </ul>
            </div>
        </aside>
    </div>
</div>
{% endblock %}
