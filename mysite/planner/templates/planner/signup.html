{% extends 'planner/base.html' %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Create Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <p class="helper-link">
            Already have an account? <a href="{% url 'login' %}">Log in</a>.
        </p>
    </div>
</div>
{% endblock %}
